<div>
  <input
    type="text"
    placeholder="Buscar por nombre..."
  >

  <select>
    <option value="default">Default</option>
    <option value="alive">Alive</option>
    <option value="dead">Dead</option>
    <option value="unknown">Unknown</option>
  </select>
</div>


<table>
  <thead>
    <tr>
      <th>NAME</th>
      <th>STATUS</th>
      <th>SPECIES</th>
      <th>TYPE</th>
      <th>GENDER</th>
      <th>CREATED</th>
    </tr>
  </thead>
  <tbody>
    <tr *ngFor="let char of listCharacters | async">
      <td>{{char.name}}</td>
      <td>{{char.status}}</td>
      <td>{{char.species}}</td>
      <td>{{char.type}}</td>
      <td>{{char.gender}}</td>
      <td>{{char.created | date: 'dd/MMM/y  h:mm:ss a'}}</td>
    </tr>
  </tbody>
</table>
